services:
  postgres:
    image: postgres:16-alpine
    container_name: cupid_postgres
    environment:
      POSTGRES_USER: cupid
      POSTGRES_PASSWORD: cupid
      POSTGRES_DB: cupid_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cupid" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cupid_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: cupid_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"

volumes:
  postgres_data:
  redis_data:
  chroma_data:
